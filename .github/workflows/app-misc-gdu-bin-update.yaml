name: app-misc/gdu-bin update

permissions:
  contents: write

on:
  schedule:
    - cron: '20 5 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/app-misc-gdu-bin-update.yaml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  ecn: app-misc
  epn: gdu-bin
  description: "Fast disk usage analyzer with console interface written in Go"
  homepage: "https://github.com/dundee/gdu"
  github_owner: dundee
  github_repo: gdu
  keywords: ~amd64 ~arm ~arm64 ~x86
  workflow_filename: app-misc-gdu-bin-update.yaml
  gdu_binary_installed_name: 'gdu'
  gdu_binary_archived_name_amd64: 'gdu_linux_amd64'
  gdu_release_name_amd64: 'gdu_linux_amd64.tgz'
  gdu_binary_archived_name_arm: 'gdu_linux_armv7l'
  gdu_release_name_arm: 'gdu_linux_armv7l.tgz'
  gdu_binary_archived_name_arm64: 'gdu_linux_arm64'
  gdu_release_name_arm64: 'gdu_linux_arm64.tgz'
  gdu_binary_archived_name_x86: 'gdu_linux_386'
  gdu_release_name_x86: 'gdu_linux_386.tgz'

jobs:
  check-and-create-ebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Install required tools
        run: |
            sudo apt-get update
            sudo apt-get install -y wget jq coreutils
            if command -v go &> /dev/null
            then
                go install github.com/arran4/g2/cmd/g2@latest
                sudo cp ~/go/bin/g2 /usr/local/bin/g2
            else
                url="$(curl -s --header "Accept: application/vnd.github+json" --header "Authorization: Bearer ${{secrets.GITHUB_TOKEN}}" https://api.github.com/repos/arran4/g2/releases/latest | jq -r '.assets[].browser_download_url | select(endswith("_linux_amd64.deb"))')"
                echo "$url"
                wget "${url}" -O /tmp/g2.deb
                sudo dpkg -i /tmp/g2.deb
                rm /tmp/g2.deb
            fi

      - name: Process each release
        id: process_releases
        run: |
          ebuild_dir="./${{ env.ecn }}/${{ env.epn }}"
          mkdir -p "$ebuild_dir"
          metadata_file="${ebuild_dir}/metadata.xml"
          if [ ! -f "$metadata_file" ]; then
            {
              echo '<?xml version="1.0" encoding="UTF-8"?>'
              echo '<!DOCTYPE pkgmetadata SYSTEM "http://www.gentoo.org/dtd/metadata.dtd">'
              echo '<pkgmetadata>'
              echo '	<upstream>'
              echo '		<remote-id type="github">dundee/gdu</remote-id>'
              echo '	</upstream>'
              echo '</pkgmetadata>'
            } > "$metadata_file"
          fi
          declare -A releaseTypes=()
          tags=$(curl -s  --header "Accept: application/vnd.github+json" --header "Authorization: Bearer ${{secrets.GITHUB_TOKEN}}" https://api.github.com/repos/${{ env.github_owner }}/${{ env.github_repo }}/releases | jq -r '.[]? | select(type=="object" and has("tag_name")) | .tag_name')
          # shellcheck disable=SC2086
          for tag in $tags; do
            version="${tag#v}"

            # shellcheck disable=SC2034
            originalVersion="${version}"
            if ! echo "${version}" | grep -E '^([0-9]+)\.([0-9]+)(\.([0-9]+))?(-r[0-9]+)?((_)(alpha|beta|rc|p)[0-9]*)*$'; then
                echo "tag / $version doesn't match regexp";
                continue;
            fi
            releaseType="$(echo "${version}" | sed -n 's/^[^_]\+_\(alpha\|beta\|rc\|p[0-9]*\).*$/\1/p')"
            if [[ ! -v releaseTypes[${releaseType:=release}] ]]; then
                if [[ -v releaseTypes[release] ]]; then
                  echo "Already have a newer main release: ${releaseTypes[release]}"
                  continue
                fi
                releaseTypes[${releaseType:=release}]="${version}"
            else
                echo "Already have a newer ${releaseType:=release} release: ${releaseTypes[${releaseType:=release}]}"
                continue
            fi
            ebuild_file="${ebuild_dir}/${{ env.epn }}-${version}.ebuild"
            if [ ! -f "$ebuild_file" ]; then

              # shellcheck disable=SC2016
              {
                echo '# Generated via: https://github.com/arran4/arrans_overlay/blob/main/.github/workflows/${{ env.workflow_filename }}'
                echo 'EAPI=8'
                echo "DESCRIPTION=\"${{ env.description }}\""
                echo "HOMEPAGE=\"${{ env.homepage }}\""
                echo 'SRC_URI="'
                echo "  amd64? (  https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v\${PV}/gdu_linux_amd64.tgz -> \${P}-gdu_linux_amd64.tgz  )  "
                echo "  arm? (  https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v\${PV}/gdu_linux_armv7l.tgz -> \${P}-gdu_linux_armv7l.tgz  )  "
                echo "  arm64? (  https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v\${PV}/gdu_linux_arm64.tgz -> \${P}-gdu_linux_arm64.tgz  )  "
                echo "  x86? (  https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v\${PV}/gdu_linux_386.tgz -> \${P}-gdu_linux_386.tgz  )  "
                echo '"'
                echo 'LICENSE="MIT"'
                echo 'SLOT="0"'
                echo 'KEYWORDS="${{ env.keywords }}"'
                echo -n 'IUSE="'
                echo -n ''
                echo -n ''
                echo -n ''
                echo -n ''
                echo '"'
                echo ''
                echo -n 'REQUIRED_USE="'
                echo -n ''
                echo '"'
                echo ''
                echo -n 'RDEPEND="'
                echo -n ''
                echo -n ''
                echo '"'
                echo ''
                echo 'S="${WORKDIR}"'
                echo ''
                echo 'src_unpack() {'
                echo '  if use amd64; then'
                echo "    unpack \"\${DISTDIR}/\${P}-gdu_linux_amd64.tgz\" || die \"Can't unpack archive file\""
                echo "    mv \"\${WORKDIR}/gdu_linux_amd64\" \"\${S}/gdu\" || die"
                echo '  fi'
                echo '  if use arm; then'
                echo "    unpack \"\${DISTDIR}/\${P}-gdu_linux_armv7l.tgz\" || die \"Can't unpack archive file\""
                echo "    mv \"\${WORKDIR}/gdu_linux_armv7l\" \"\${S}/gdu\" || die"
                echo '  fi'
                echo '  if use arm64; then'
                echo "    unpack \"\${DISTDIR}/\${P}-gdu_linux_arm64.tgz\" || die \"Can't unpack archive file\""
                echo "    mv \"\${WORKDIR}/gdu_linux_arm64\" \"\${S}/gdu\" || die"
                echo '  fi'
                echo '  if use x86; then'
                echo "    unpack \"\${DISTDIR}/\${P}-gdu_linux_386.tgz\" || die \"Can't unpack archive file\""
                echo "    mv \"\${WORKDIR}/gdu_linux_386\" \"\${S}/gdu\" || die"
                echo '  fi'
                echo '}'
                echo ''
                echo 'src_install() {'
                echo '  dobin gdu'
                echo '}'
              } > $ebuild_file

              # Manifest generation

              g2 manifest upsert-from-url "https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/${tag}/gdu_linux_amd64.tgz" "${{ env.epn }}-${version}-gdu_linux_amd64.tgz" "${ebuild_dir}/Manifest"
              g2 manifest upsert-from-url "https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/${tag}/gdu_linux_armv7l.tgz" "${{ env.epn }}-${version}-gdu_linux_armv7l.tgz" "${ebuild_dir}/Manifest"
              g2 manifest upsert-from-url "https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/${tag}/gdu_linux_arm64.tgz" "${{ env.epn }}-${version}-gdu_linux_arm64.tgz" "${ebuild_dir}/Manifest"
              g2 manifest upsert-from-url "https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/${tag}/gdu_linux_386.tgz" "${{ env.epn }}-${version}-gdu_linux_386.tgz" "${ebuild_dir}/Manifest"
              echo "generated_tag=${tag}" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Commit and push changes
        run: |
          ebuild_dir="./${{ env.ecn }}/${{ env.epn }}"
          git add "./${ebuild_dir}"
          if git commit -m "Add ebuilds for new ${{ env.epn }} releases tag ${generated_tag}"; then
            git pull --rebase &&
            git push
          fi || true
        if: steps.process_releases.outputs.generated_tag
