# Generated using: https://github.com/arran4/arrans_overlay_workflow_builder 0.1.23 Github Binary Release /app/current.config 2026-03-18 04:28:54.222620492 +0000 UTC m=+0.005424044

name: app-misc/voxtype-bin update

permissions:
  contents: write

on:
  schedule:
    - cron: '19 13 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/app-misc-voxtype-bin-update.yaml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  ecn: app-misc
  epn: voxtype-bin
  description: "Push-to-talk voice-to-text for Linux. Optimized for Wayland, works on X11 too."
  homepage: "https://voxtype.io/"
  github_owner: peteonrails
  github_repo: voxtype
  keywords: ~amd64
  workflow_filename: app-misc-voxtype-bin-update.yaml
  voxtype_binary_installed_name: 'voxtype'
  voxtype_binary_archived_name_amd64: 'voxtype'
  voxtype_release_name_amd64: 'voxtype-\${PV}-linux-x86_64-avx2'

jobs:
  check-and-create-ebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Install required tools
        run: |
            sudo apt-get update
            sudo apt-get install -y wget jq coreutils
            if command -v go &> /dev/null
            then
                go install github.com/arran4/g2/cmd/g2@latest
                sudo cp ~/go/bin/g2 /usr/local/bin/g2
            else
                url="$(curl -s --header "Accept: application/vnd.github+json" --header "Authorization: Bearer ${{secrets.GITHUB_TOKEN}}" https://api.github.com/repos/arran4/g2/releases/latest | jq -r '.assets[].browser_download_url | select(endswith("_linux_amd64.deb"))')"
                echo "$url"
                wget "${url}" -O /tmp/g2.deb
                sudo dpkg -i /tmp/g2.deb
                rm /tmp/g2.deb
            fi

      - name: Process each release
        id: process_releases
        run: |
          ebuild_dir="./${{ env.ecn }}/${{ env.epn }}"
          mkdir -p "$ebuild_dir"
          metadata_file="${ebuild_dir}/metadata.xml"
          if [ ! -f "$metadata_file" ]; then
            cat <<EOF > "$metadata_file"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE pkgmetadata SYSTEM "http://www.gentoo.org/dtd/metadata.dtd">
          <pkgmetadata>
            <maintainer type="person">
              <email>gentoo@arran4.com</email>
              <name>Arran Ubels</name>
            </maintainer>
            <upstream>
              <remote-id type="github">peteonrails/voxtype</remote-id>
            </upstream>
          </pkgmetadata>
          EOF
          fi
          declare -A releaseTypes=()
          tags=$(curl -s  --header "Accept: application/vnd.github+json" --header "Authorization: Bearer ${{secrets.GITHUB_TOKEN}}" https://api.github.com/repos/${{ env.github_owner }}/${{ env.github_repo }}/releases | jq -r '.[]? | select(type=="object" and has("tag_name")) | .tag_name')
          # shellcheck disable=SC2086
          for tag in $tags; do
            version="${tag#v}"
            if [ "${version}" = "${tag}" ]; then
                echo "$version == $tag so there is no v removed skipping"
                continue
            fi
            # shellcheck disable=SC2034
            originalVersion="${version}"
            if ! echo "${version}" | grep -E '^([0-9]+)\.([0-9]+)(\.([0-9]+))?(-r[0-9]+)?((_)(alpha|beta|rc|p)[0-9]*)*$'; then
                echo "tag / $version doesn't match regexp";
                continue;
            fi
            releaseType="$(echo "${version}" | sed -n 's/^[^_]\+_\(alpha\|beta\|rc\|p[0-9]*\).*$/\1/p')"
            if [[ ! -v releaseTypes[${releaseType:=release}] ]]; then
                if [[ -v releaseTypes[release] ]]; then
                  echo "Already have a newer main release: ${releaseTypes[release]}"
                  continue
                fi
                releaseTypes[${releaseType:=release}]="${version}"
            else
                echo "Already have a newer ${releaseType:=release} release: ${releaseTypes[${releaseType:=release}]}"
                continue
            fi
            ebuild_file="${ebuild_dir}/${{ env.epn }}-${version}.ebuild"
            if [ ! -f "$ebuild_file" ]; then

              # shellcheck disable=SC2016
              {
                echo '# Generated via: https://github.com/arran4/arrans_overlay/blob/main/.github/workflows/${{ env.workflow_filename }}'
                echo 'EAPI=8'
                echo "DESCRIPTION=\"${{ env.description }}\""
                echo "HOMEPAGE=\"${{ env.homepage }}\""
                echo 'SRC_URI="'
                echo '	amd64? ('
                echo '		!onnx? ('
                echo '			!cpu_flags_x86_avx512? ( !vulkan? ( https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v${PV}/voxtype-${PV}-linux-x86_64-avx2 -> ${P}-voxtype-${PV}-linux-x86_64-avx2 ) )'
                echo '			cpu_flags_x86_avx512? ( https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v${PV}/voxtype-${PV}-linux-x86_64-avx512 -> ${P}-voxtype-${PV}-linux-x86_64-avx512 )'
                echo '			vulkan? ( https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v${PV}/voxtype-${PV}-linux-x86_64-vulkan -> ${P}-voxtype-${PV}-linux-x86_64-vulkan )'
                echo '		)'
                echo '		onnx? ('
                echo '			!cpu_flags_x86_avx512? ( !cuda? ( !rocm? ( https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v${PV}/voxtype-${PV}-linux-x86_64-onnx-avx2 -> ${P}-voxtype-${PV}-linux-x86_64-onnx-avx2 ) ) )'
                echo '			cpu_flags_x86_avx512? ( https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v${PV}/voxtype-${PV}-linux-x86_64-onnx-avx512 -> ${P}-voxtype-${PV}-linux-x86_64-onnx-avx512 )'
                echo '			cuda? ( https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v${PV}/voxtype-${PV}-linux-x86_64-onnx-cuda -> ${P}-voxtype-${PV}-linux-x86_64-onnx-cuda )'
                echo '			rocm? ( https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v${PV}/voxtype-${PV}-linux-x86_64-onnx-rocm -> ${P}-voxtype-${PV}-linux-x86_64-onnx-rocm )'
                echo '		)'
                echo '	)'
                echo '"'
                echo 'LICENSE="MIT"'
                echo 'SLOT="0"'
                echo 'RESTRICT="strip"'
                echo 'QA_PREBUILT="usr/bin/voxtype"'
                echo 'KEYWORDS="${{ env.keywords }}"'
                echo -n 'IUSE="cpu_flags_x86_avx512 vulkan cuda rocm onnx"'
                echo -n ''
                echo -n ''
                echo -n ''
                echo -n ''
                echo '"'
                echo ''
                echo -n 'REQUIRED_USE="?? ( cpu_flags_x86_avx512 vulkan cuda rocm )"'
                echo -n ''
                echo '"'
                echo ''
                echo -n 'RDEPEND="'
                echo -n 'gui-libs/wl-clipboard app-accessibility/ydotool x11-misc/dotool'
                echo -n ''
                echo '"'
                echo ''
                echo 'S="${WORKDIR}"'
                echo ''
                echo 'src_unpack() {'
                echo '	if use amd64; then'
                echo '		local target="avx2"'
                echo '		use cpu_flags_x86_avx512 && target="avx512"'
                echo '		use vulkan && target="vulkan"'
                echo '		use onnx && target="onnx-avx2"'
                echo '		use onnx && use cpu_flags_x86_avx512 && target="onnx-avx512"'
                echo '		use onnx && use cuda && target="onnx-cuda"'
                echo '		use onnx && use rocm && target="onnx-rocm"'
                echo '		cp "${DISTDIR}/${P}-voxtype-${PV}-linux-x86_64-${target}" "${S}/voxtype" || die'
                echo '	fi'
                echo '}'
                echo ''
                echo 'src_install() {'
                echo '	exeinto /usr/bin'
                echo '	if use amd64; then'
                echo '		newexe "${S}/voxtype" voxtype || die'
                echo '	fi'
                echo '}'
              } > $ebuild_file

              # Manifest generation

              for variant in avx2 avx512 vulkan onnx-avx2 onnx-avx512 onnx-cuda onnx-rocm; do
                g2 manifest upsert-from-url "https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/${tag}/voxtype-${version}-linux-x86_64-${variant}" "${{ env.epn }}-${version}-voxtype-${version}-linux-x86_64-${variant}" "${ebuild_dir}/Manifest" || true
              done
              echo "generated_tag=${tag}" >> $GITHUB_OUTPUT
            fi
          done

      - name: Commit and push changes
        run: |
          ebuild_dir="./${{ env.ecn }}/${{ env.epn }}"
          git add "./${ebuild_dir}"
          if git commit -m "Add ebuilds for new ${{ env.epn }} releases tag ${generated_tag}"; then
            git pull --rebase &&
            git push
          fi || true
        if: steps.process_releases.outputs.generated_tag
