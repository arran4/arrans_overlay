name: Scheduled Daily Tasks

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      g2_version:
        description: 'Version of g2 to use'
        required: false
        default: 'latest'
        type: string
  push:
    paths:
      - '.github/workflows/scheduled-daily-tasks.yml'
  workflow_run:
    workflows: ["app-admin/g2-bin update"]
    types:
      - completed

jobs:
  scheduled-tasks:
    runs-on: ubuntu-latest
    container:
      image: gentoo/stage3
      options: --user root
    steps:
      - name: Install dependencies
        run: |
          mkdir -p /etc/portage
          echo 'ACCEPT_LICENSE="*"' > /etc/portage/make.conf
          echo 'FEATURES="-ipc-sandbox -network-sandbox -pid-sandbox"' >> /etc/portage/make.conf
          mkdir -p /var/db/repos/gentoo
          emerge-webrsync
          emerge --quiet app-portage/portage-utils dev-vcs/git net-misc/curl app-misc/jq dev-util/github-cli

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Overlay
        run: |
          mkdir -p /etc/portage/repos.conf
          cat > /etc/portage/repos.conf/arrans-overlay.conf << INNER_EOF
          [arrans-overlay]
          location = $(pwd)
          INNER_EOF

      - name: Remove duplicate ebuilds
        id: dedupe
        continue-on-error: true
        run: |
          chmod +x ./scripts/remove_duplicate_ebuilds.py
          OUTPUT=$(./scripts/remove_duplicate_ebuilds.py)
          echo "DEDUPE_OUTPUT<<INNER_EOF" >> $GITHUB_ENV
          echo "$OUTPUT" >> $GITHUB_ENV
          echo "INNER_EOF" >> $GITHUB_ENV
          echo "$OUTPUT"

      - name: Run egencache update
        id: egencache
        continue-on-error: true
        run: |
          OUTPUT=$(egencache --repo=arrans-overlay --update 2>&1 || true)
          echo "EGENCACHE_OUTPUT<<INNER_EOF" >> $GITHUB_ENV
          echo "$OUTPUT" >> $GITHUB_ENV
          echo "INNER_EOF" >> $GITHUB_ENV
          echo "$OUTPUT"

      - name: Check for unstaged changes
        id: check_changes
        run: |
          git config --global --add safe.directory "$(pwd)" && git add .
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Close previous unmerged PRs
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list --state open --author "app/github-actions" --head "chore/scheduled-daily-tasks" --json number -q '.[].number')
          mapfile -t pr_array <<< "$prs"
          for pr in "${pr_array[@]}"; do
            echo "Closing old unmerged PR #$pr"
            gh pr close "$pr" -c "Closing in favor of newer daily tasks run" || true
          done

      - name: Generate Readable Diff
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          OUTPUT=$(git diff HEAD | head -c 60000)
          echo "READABLE_DIFF<<INNER_EOF" >> $GITHUB_ENV
          echo "$OUTPUT" >> $GITHUB_ENV
          echo "INNER_EOF" >> $GITHUB_ENV


      - name: Generate PR Summary
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          SUMMARY=""
          if echo "${DEDUPE_OUTPUT}" | grep -q "Removed duplicated ebuilds:"; then
            SUMMARY="${SUMMARY}**Duplicate Ebuilds Removed:**\n\n"
            while IFS= read -r line; do
              if [[ "$line" =~ ^[[:space:]]*-[[:space:]]+(.*)$ ]]; then
                SUMMARY="${SUMMARY}- \`${BASH_REMATCH[1]}\`\n"
              fi
            done <<< "${DEDUPE_OUTPUT}"
            SUMMARY="${SUMMARY}\n"
          fi
          echo "PR_SUMMARY<<INNER_EOF" >> $GITHUB_ENV
          echo -e "$SUMMARY" >> $GITHUB_ENV
          echo "INNER_EOF" >> $GITHUB_ENV

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: scheduled daily tasks"
          title: "Automated daily tasks (egencache & dedupe)"
          body: |
            This PR was auto-generated by the daily tasks workflow.

            ${{ env.PR_SUMMARY }}

            <details>
            <summary>Duplicate Ebuilds Removal</summary>

            ```text
            ${{ env.DEDUPE_OUTPUT }}
            ```
            </details>

            <details>
            <summary>Egencache Update</summary>

            ```text
            ${{ env.EGENCACHE_OUTPUT }}
            ```
            </details>

            <details>
            <summary>Readable Diff</summary>

            ```diff
            ${{ env.READABLE_DIFF }}
            ```
            </details>
          branch: "chore/scheduled-daily-tasks"
          delete-branch: true
          base: main

  check-activity:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for commits in last 24 hours
        id: check
        run: |
          # Get count of commits in last 24 hours
          # We use `git log --since="24 hours ago"`
          COMMIT_COUNT=$(git log --since="24 hours ago" --oneline | wc -l)
          if [ "$COMMIT_COUNT" -gt 0 ]; then
            echo "Found $COMMIT_COUNT commits in the last 24 hours."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No commits in the last 24 hours."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  nightly-test:
    needs: check-activity
    if: ${{ needs.check-activity.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    container:
      image: gentoo/stage3
      options: --user root
      volumes:
        - /var/cache/distfiles
    steps:
      - name: Install git
        run: |
           # Ensure git is installed for checkout and for identifying changed files
           # (Though we might use direct file listing if we wanted, but git diff is easier)
           mkdir -p /var/db/repos/gentoo
           # minimal setup to install git if missing
           if ! command -v git >/dev/null; then
             emerge-webrsync
             emerge --quiet dev-vcs/git
           fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Portage
        run: |
          # Sync portage (if not done above)
          if [ ! -d "/var/db/repos/gentoo/profiles" ]; then
             for i in {1..3}; do emerge-webrsync && break || sleep 15; done
          fi

          # Configure for binary packages
          # We append to make.conf to enable getbinpkg globally
          echo 'FEATURES="${FEATURES} -ipc-sandbox -network-sandbox -pid-sandbox getbinpkg"' >> /etc/portage/make.conf
          # Also set EMERGE_DEFAULT_OPTS to always use binaries if available and respect it
          # -g = --getbinpkg, -K = --usepkgonly (no, we want to build if bin missing), -k = --usepkg
          # User said: "install binary from upstream where possible"
          # So -g (get from remote) and -k (use it)
          echo 'EMERGE_DEFAULT_OPTS="${EMERGE_DEFAULT_OPTS} --getbinpkg --usepkg"' >> /etc/portage/make.conf

          # Define a binhost if not set. Gentoo stage3 usually doesn't have one.
          # We can try to use a public mirror's binpackages if available for the architecture.
          # For amd64, we can look at gentoo mirror.
          # However, blindly setting it might be risky if we don't know the profile.
          # Let's check existing make.conf
          cat /etc/portage/make.conf

          # A generic safe binhost for amd64/stable (assuming stage3 is that)
          # ARCH=$(portageq envvar ARCH)
          # if [ "$ARCH" == "amd64" ]; then
          #    echo 'PORTAGE_BINHOST="https://gentoo.osuosl.org/releases/amd64/binpackages/23.0/x86-64/"' >> /etc/portage/make.conf
          # fi
          # Since we can't easily guess the exact binhost structure without risk,
          # we will rely on EMERGE_DEFAULT_OPTS enabling the mechanism,
          # but we might simply skip defining PORTAGE_BINHOST if we aren't sure.
          # BUT the user request explicitly asked for it.
          # "It should install binary from upstream where possible"
          # This implies enabling the feature. If upstream (Gentoo) provides it.
          # I will add the getbinpkg flags. The stage3 might have a default binhost in newer releases.

      - name: Run Tests
        run: |
          # Identify changed ebuilds in the last 24 hours
          # We look at diff since "24 hours ago"
          CHANGED_EBUILDS=$(git log --since="24 hours ago" --name-only --pretty=format: | grep '\.ebuild$' | sort -u || true)

          if [ -z "$CHANGED_EBUILDS" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
             echo "No ebuilds changed in the last 24h (but commits existed?)."
             exit 0
          fi

          # If workflow_dispatch, and no changes found (or maybe we want to force test all?),
          # assume we test changed files if any, or maybe HEAD?
          # Let's strictly stick to "changed files".

          if [ -n "$CHANGED_EBUILDS" ]; then
             chmod +x scripts/test_ebuilds.sh
             # Pass -m merge to actually install
             ./scripts/test_ebuilds.sh -m merge $CHANGED_EBUILDS
          else
             echo "No ebuilds changed."
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install g2
        uses: arran4/g2-action@v1.2
        with:
          version: ${{ inputs.g2_version || 'latest' }}

      - name: Generate site
        run: |
          g2 overlay site generate -out site_out

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site_out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
