name: Check and Update Antigravity Bin

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/dev-util-antigravity-bin-update.yaml'

env:
  ecn: dev-util
  epn: antigravity-bin
  description: "Google Antigravity AI-driven IDE (binary release)"
  homepage: "https://antigravity.google/"
  workflow_filename: dev-util-antigravity-bin-update.yaml

jobs:
  check-and-create-ebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install g2
        uses: arran4/g2-action@v1.1

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Install required tools
        run: |
            sudo apt-get update
            sudo apt-get install -y wget jq coreutils curl
      - name: Process release
        id: process_releases
        run: |
          ebuild_dir="./${{ env.ecn }}/${{ env.epn }}"
          mkdir -p "$ebuild_dir"
          metadata_file="${ebuild_dir}/metadata.xml"
          if [ ! -f "$metadata_file" ]; then
          if [ ! -f "$metadata_file" ]; then
            {
              echo '<?xml version="1.0" encoding="UTF-8"?>'
              echo '<!DOCTYPE pkgmetadata SYSTEM "http://www.gentoo.org/dtd/metadata.dtd">'
              echo '<pkgmetadata>'
              echo '  <maintainer type="person">'
              echo '    <email>gentoo@arran4.com</email>'
              echo '    <name>Arran Ubels</name>'
              echo '  </maintainer>'
              echo '</pkgmetadata>'
            } > "$metadata_file"
          fi
          fi

          curl -sL --compressed -A "Mozilla/5.0" https://antigravity.google/download/linux > /tmp/index.html
          main_js=$(grep -o 'main-[^"]*\.js' /tmp/index.html | head -n 1 | tr -d '\r')
          echo "main_js: $main_js"
          if [ -z "$main_js" ]; then
            echo "Could not find main_js. First 500 bytes of index.html:"
            head -c 500 /tmp/index.html
            exit 1
          fi

          curl -sL --compressed -A "Mozilla/5.0" "https://antigravity.google/$main_js" > /tmp/main.js
          download_url=$(grep -io 'https://[a-zA-Z0-9./_-]*antigravity\.tar\.gz' /tmp/main.js | head -n 1 | tr -d '\r')
          echo "download_url: $download_url"
          if [ -z "$download_url" ]; then
            echo "Could not find download_url. First 500 bytes of main.js:"
            head -c 500 /tmp/main.js
            exit 1
          fi

          version=$(echo "$download_url" | awk -F'/' '{for(i=1;i<=NF;i++) if($i=="stable") print $(i+1)}')
          echo "version: $version"
          if [ -z "$version" ]; then
            echo "Could not find version"
            exit 1
          fi

          gentoo_version=$(echo "$version" | sed 's/-/_p/g')

          ebuild_file="${ebuild_dir}/${{ env.epn }}-${gentoo_version}.ebuild"
          needs_update=false

          if [ ! -f "$ebuild_file" ]; then
              needs_update=true
          fi

          if [ "$needs_update" = true ]; then
            # shellcheck disable=SC2016
            {
              echo '# Generated via: https://github.com/arran4/arrans_overlay/blob/main/.github/workflows/${{ env.workflow_filename }}'
              echo 'EAPI=8'
              echo "DESCRIPTION=\"${{ env.description }}\""
              echo "HOMEPAGE=\"${{ env.homepage }}\""
              echo 'LICENSE="unknown"'
              echo 'SLOT="0"'
              echo 'KEYWORDS="~amd64"'
              echo 'IUSE=""'
              echo 'DEPEND=""'
              echo 'RDEPEND="sys-libs/glibc"'
              echo 'RESTRICT="strip"'
              echo 'QA_PREBUILT="opt/antigravity/antigravity opt/antigravity/chrome-sandbox"'
              echo ''
              echo 'SRC_URI="amd64? ( '"${download_url}"' -> ${P}.tar.gz )"'
              echo ''
              echo 'S="${WORKDIR}/Antigravity"'
              echo ''
              echo 'src_install() {'
              echo '  insinto /opt/antigravity'
              echo '  doins -r *'
              echo '  fperms +x /opt/antigravity/antigravity'
              echo '  fperms 4755 /opt/antigravity/chrome-sandbox'
              echo '  dosym ../antigravity/antigravity /opt/bin/antigravity'
              echo '}'
            } > "$ebuild_file"

            g2 manifest upsert-from-url "$download_url" "${{ env.epn }}-${gentoo_version}.tar.gz" "${ebuild_dir}/Manifest"
            rm -f "${{ env.epn }}-${gentoo_version}.tar.gz"
            echo "generated_version=${gentoo_version}" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.process_releases.outputs.generated_version
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add ebuilds for new ${{ env.epn }} release ${{ steps.process_releases.outputs.generated_version }}"
          title: "Update ${{ env.epn }} to ${{ steps.process_releases.outputs.generated_version }}"
          body: "Automated update for ${{ env.epn }} to version ${{ steps.process_releases.outputs.generated_version }}."
          branch: "update-${{ env.epn }}-${{ steps.process_releases.outputs.generated_version }}-1"
          base: main
          signoff: false
