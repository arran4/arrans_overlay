name: media-gfx/goshot-bin update

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '11 11 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/media-gfx-goshot-bin-update.yaml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ecn: media-gfx
  epn: goshot-bin
  description: "A cross-platform screenshot tool written in Go"
  homepage: "https://github.com/watzon/goshot"
  github_owner: watzon
  github_repo: goshot
  keywords: ~amd64 ~arm ~arm64
  workflow_filename: media-gfx-goshot-bin-update.yaml

jobs:
  check-and-create-ebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install g2
        uses: arran4/g2-action@v1.2

      - name: Fetch latest release version
        id: get_version
        run: |
          ebuild_dir="./${{ env.ecn }}/${{ env.epn }}"
          mkdir -p "$ebuild_dir"
          tags=$(curl -s "https://api.github.com/repos/${github_owner}/${github_repo}/releases" | jq -r '.[].tag_name' | grep '^v[0-9]' || true)
          echo "Tags: $tags"
          for tag in $tags; do
            version="${tag#v}"
            ebuild_file="${ebuild_dir}/${epn}-${version}.ebuild"

            if [ -f "$ebuild_file" ]; then
              echo "Ebuild for version $version already exists. Skipping."
              continue
            fi

            cat <<- 'EBUILD' > "${ebuild_file}"
          EAPI=8
          DESCRIPTION="A cross-platform screenshot tool written in Go"
          HOMEPAGE="https://github.com/watzon/goshot"
          SRC_URI="
              amd64? ( https://github.com/watzon/goshot/releases/download/v${PV}/goshot_Linux_x86_64.tar.gz -> goshot-${PV}_Linux_x86_64.tar.gz )
              arm? ( https://github.com/watzon/goshot/releases/download/v${PV}/goshot_Linux_arm.tar.gz -> goshot-${PV}_Linux_arm.tar.gz )
              arm64? ( https://github.com/watzon/goshot/releases/download/v${PV}/goshot_Linux_arm64.tar.gz -> goshot-${PV}_Linux_arm64.tar.gz )
          "

          LICENSE="MIT"
          SLOT="0"
          KEYWORDS="~amd64 ~arm ~arm64"
          RESTRICT="strip"

          S="${WORKDIR}"

          src_install() {
              dobin goshot
          }
          EBUILD

            echo "Generated ebuild for version $version"

            if [ ! -f "${ebuild_dir}/metadata.xml" ]; then
              cat <<- 'XML' > "${ebuild_dir}/metadata.xml"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE pkgmetadata SYSTEM "https://www.gentoo.org/dtd/metadata.dtd">
          <pkgmetadata>
              <maintainer type="person">
                  <email>gentoo-overlay@arran4.com</email>
                  <name>Arran Stewart</name>
              </maintainer>
              <upstream>
                  <remote-id type="github">watzon/goshot</remote-id>
              </upstream>
          </pkgmetadata>
          XML
            fi

            g2 manifest upsert-from-url "https://github.com/${github_owner}/${github_repo}/releases/download/v${version}/goshot_Linux_x86_64.tar.gz" "goshot-${version}_Linux_x86_64.tar.gz" "${ebuild_dir}/Manifest"
            g2 manifest upsert-from-url "https://github.com/${github_owner}/${github_repo}/releases/download/v${version}/goshot_Linux_arm.tar.gz" "goshot-${version}_Linux_arm.tar.gz" "${ebuild_dir}/Manifest"
            g2 manifest upsert-from-url "https://github.com/${github_owner}/${github_repo}/releases/download/v${version}/goshot_Linux_arm64.tar.gz" "goshot-${version}_Linux_arm64.tar.gz" "${ebuild_dir}/Manifest"

            echo "version_added=true" >> "$GITHUB_ENV"
            break
          done

      - name: Create Pull Request
        if: env.version_added == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update ${{ env.epn }} to latest version"
          title: "Update ${{ env.epn }} to latest version"
          body: |
            Updates ${{ env.epn }} to the latest release from ${{ env.homepage }}.

            Auto-generated by workflow.
          branch: "update-${{ env.epn }}"
          base: main
          labels: "automated pr"
          assignees: arran4
          reviewers: arran4
