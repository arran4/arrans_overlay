name: app-misc/kjules Update

permissions:
  contents: write

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/app-misc-kjules-update.yaml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  ebuild_category: app-misc
  ebuild_name: kjules
  github_owner: arran4
  github_repo: kjules
  description: "kjules KDE application"
  homepage: "https://github.com/arran4/kjules"

jobs:
  check-and-create-ebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install g2
        uses: arran4/g2-action@v1.2

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq coreutils

      - name: Process each release
        id: process_releases
        run: |
          ebuild_dir="./${{ env.ebuild_category }}/${{ env.ebuild_name }}"
          mkdir -p $ebuild_dir
          tags=$(curl -s --header "Accept: application/vnd.github+json" --header "Authorization: Bearer ${{secrets.GITHUB_TOKEN}}" https://api.github.com/repos/${{ env.github_owner }}/${{ env.github_repo }}/releases | jq -r '.[].tag_name')
          for tag in $tags; do
            version="${tag#v}"
            if [ "${version}" = "${tag}" ]; then
              echo "$version == $tag so there is no V removed skipping"
              continue
            fi
            if ! echo "$version" | egrep '^([0-9]+)\.([0-9]+)(\.([0-9]+))?(-r[0-9]+)?((_)(alpha|beta|rc|p)[0-9]*)*$'; then
              echo "$tag / $version doesn't match regexp";
              continue;
            fi
            ebuild_file="${ebuild_dir}/${{ env.ebuild_name }}-${version}.ebuild"
            if [ ! -f "$ebuild_file" ]; then
              # Create ebuild script
              {
                echo "# Generated via: https://github.com/arran4/arrans_overlay/blob/main/.github/workflows/app-misc-kjules-update.yaml"
                echo "EAPI=8"
                echo ""
                echo "inherit ecm"
                echo ""
                echo "DESCRIPTION=\"${{ env.description }}\""
                echo "HOMEPAGE=\"${{ env.homepage }}\""
                echo 'SRC_URI="https://github.com/${{env.github_owner}}/${{env.github_repo}}/archive/refs/tags/v${PV}.tar.gz -> ${P}.tar.gz"'
                echo 'S="${WORKDIR}/${P}"'
                echo ""
                echo 'LICENSE="MIT"'
                echo "SLOT=\"0\""
                echo 'KEYWORDS="~amd64"'
                echo ""
                echo 'DEPEND="'
                echo '    dev-qt/qtbase:6'
                echo '    dev-qt/qtdeclarative:6'
                echo '    kde-frameworks/kcoreaddons:6'
                echo '    kde-frameworks/ki18n:6'
                echo '    kde-frameworks/kxmlgui:6'
                echo '"'
                echo 'RDEPEND="${DEPEND}"'
                echo ""
                echo "src_configure() {"
                echo "    local mycmakeargs=("
                echo "        -DBUILD_TESTING=OFF"
                echo "    )"
                echo "    ecm_src_configure"
                echo "}"
              } > $ebuild_file

              # Generate the manifest for the new ebuild
              g2 manifest upsert-from-url "https://github.com/${{env.github_owner}}/${{env.github_repo}}/archive/refs/tags/v${version}.tar.gz" "${{ env.ebuild_name }}-${version}.tar.gz" "${ebuild_dir}/Manifest"
            fi
            break
          done

      - name: Commit and push changes
        run: |
          ebuild_dir="./${{ env.ebuild_category }}/${{ env.ebuild_name }}"
          git add "./${ebuild_dir}"
          git commit -m "Add ebuilds for new ${{ env.ebuild_name }} releases" && git pull --rebase && git push || true
        if: steps.process_releases.conclusion == 'success'
