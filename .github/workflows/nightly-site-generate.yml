name: Nightly Site Generation

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/nightly-site-generate.yml'
  workflow_run:
    workflows: ["app-admin/g2-bin update"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install g2
        uses: arran4/g2-action@v1.1

      - name: Generate site
        run: |
          /tmp/g2-bin/g2 overlay site generate -out site_out

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site_out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
