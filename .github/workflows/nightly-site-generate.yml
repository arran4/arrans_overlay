name: Nightly Site Generation

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install g2
        run: go install github.com/arran4/g2/cmd/g2@v0.0.14

      - name: Generate site
        run: ~/go/bin/g2 overlay site generate -out site_out

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site_out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
