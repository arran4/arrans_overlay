name: G2 Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install g2
        uses: arran4/g2-action@v1.2
      - name: Run g2 lint
        run: g2 lint
