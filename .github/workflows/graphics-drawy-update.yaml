name: graphics/drawy Update

permissions:
  contents: write

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/graphics-drawy-update.yaml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ebuild_category: graphics
  ebuild_name: drawy
  github_owner: KDE
  github_repo: drawy
  description: "Drawy is a lightweight infinite whiteboard built for simplicity and high performance"
  homepage: "https://invent.kde.org/graphics/drawy"

jobs:
  check-and-create-ebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch Latest Tag
        id: fetch_tag
        run: |
          LATEST_TAG=$(curl -sL "https://invent.kde.org/api/v4/projects/24090/repository/tags" | jq -r '.[].name' | grep -E '^v[0-9]' | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            echo "Failed to fetch tags from KDE API."
            return 1
          fi
          VERSION=${LATEST_TAG#v}
          echo "tag=${LATEST_TAG}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_ENV

      - name: Check if ebuild exists
        id: check_ebuild
        run: |
          if ls ${{ env.ebuild_category }}/${{ env.ebuild_name }}/${{ env.ebuild_name }}-${{ env.version }}.ebuild 1> /dev/null 2>&1; then
            echo "Ebuild for version ${{ env.version }} already exists."
            echo "exists=true" >> $GITHUB_ENV
          else
            echo "exists=false" >> $GITHUB_ENV
          fi

      - name: Create Ebuild
        if: env.exists == 'false'
        run: |
          mkdir -p ${{ env.ebuild_category }}/${{ env.ebuild_name }}
          cat << 'EOF_EBUILD' > ${{ env.ebuild_category }}/${{ env.ebuild_name }}/${{ env.ebuild_name }}-${{ env.version }}.ebuild
          EAPI=8

          KFMIN=6.19.0
          QTMIN=6.10.0

          inherit ecm

          DESCRIPTION="${{ env.description }}"
          HOMEPAGE="${{ env.homepage }}"
          SRC_URI="https://invent.kde.org/graphics/drawy/-/archive/v${PV}/drawy-v${PV}.tar.gz -> ${P}.tar.gz"
          S="${WORKDIR}/${PN}-v${PV}"

          LICENSE="GPL-3"
          SLOT="0"
          IUSE="debug"
          KEYWORDS="~amd64"

          DEPEND="
                  dev-qt/qtbase:6
                  dev-qt/qtdeclarative:6
                  kde-frameworks/kcoreaddons:6
                  kde-frameworks/ki18n:6
                  kde-frameworks/kxmlgui:6
                  kde-frameworks/kconfig:6
                  kde-frameworks/kconfigwidgets:6
                  kde-frameworks/kcrash:6
                  kde-frameworks/kwidgetsaddons:6
                  kde-frameworks/kiconthemes:6
                  kde-frameworks/syntax-highlighting:6
                  sys-libs/zlib
                  app-arch/zstd
          "
          RDEPEND="${DEPEND}"
          BDEPEND="
                  dev-qt/qttools:6[linguist]
                  sys-devel/gettext
          "
          EOF_EBUILD

      - name: Generate Manifest
        if: env.exists == 'false'
        run: |
          wget -qO drawy-${{ env.version }}.tar.gz "https://invent.kde.org/graphics/drawy/-/archive/v${{ env.version }}/drawy-v${{ env.version }}.tar.gz"
          echo "DIST drawy-${{ env.version }}.tar.gz $(stat -c%s drawy-${{ env.version }}.tar.gz) BLAKE2B $(b2sum drawy-${{ env.version }}.tar.gz | awk '{print $1}') SHA512 $(sha512sum drawy-${{ env.version }}.tar.gz | awk '{print $1}')" >> ${{ env.ebuild_category }}/${{ env.ebuild_name }}/Manifest
          rm drawy-${{ env.version }}.tar.gz

      - name: Create Pull Request
        if: env.exists == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add ${{ env.ebuild_category }}/${{ env.ebuild_name }}-${{ env.version }}"
          title: "Add ${{ env.ebuild_category }}/${{ env.ebuild_name }}-${{ env.version }}"
          body: |
            This PR adds the ebuild for `${{ env.ebuild_category }}/${{ env.ebuild_name }}` version `${{ env.version }}`.

            Generated by GitHub Actions.
          branch: "update-${{ env.ebuild_name }}-${{ env.version }}"
          base: main
