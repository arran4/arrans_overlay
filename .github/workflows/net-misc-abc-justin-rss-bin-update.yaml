                echo "	x86? (  https://github.com/${{ env.github_owner }}/${{ env.github_repo }}/releases/download/v\${PV}/abcjustinrss_\${PV}_linux_386.tar.gz -> \${P}-abcjustinrss_\${PV}_linux_386.tar.gz  )  "
                echo '"'
